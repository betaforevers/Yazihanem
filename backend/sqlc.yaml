version: "2"
sql:
  # Public schema queries (tenants table)
  - engine: "postgresql"
    queries: "internal/infrastructure/database/sqlc/queries/tenants.sql"
    schema: "migrations/schema/000001_create_tenants_table.up.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/infrastructure/database/sqlc/generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_exported_queries: true
        emit_result_struct_pointers: true
        emit_params_struct_pointers: false
        emit_methods_with_db_argument: false
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        json_tags_case_style: "snake"
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
